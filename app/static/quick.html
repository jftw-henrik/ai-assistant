<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quick Capture</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f6f6f6;
      color: #111;
      line-height: 1.5;
    }
    main {
      max-width: 36rem;
      margin: 0 auto;
      padding: 1.25rem;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.25rem;
    }
    p {
      margin: 0 0 1rem;
      color: #444;
      font-size: 0.95rem;
    }
    textarea {
      width: 100%;
      min-height: 8rem;
      padding: 0.75rem;
      font: inherit;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      resize: vertical;
      background: #fff;
    }
    textarea:focus {
      outline: 2px solid #2563eb;
      border-color: #2563eb;
    }
    button {
      margin-top: 0.75rem;
      width: 100%;
      padding: 0.85rem 1rem;
      font: inherit;
      font-weight: 600;
      border: none;
      border-radius: 0.5rem;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }
    #result {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 0.5rem;
      background: #fff;
      border: 1px solid #ddd;
      white-space: pre-wrap;
      display: none;
    }
    #result.visible { display: block; }
    #result.error {
      border-color: #fca5a5;
      background: #fef2f2;
    }
    #result.success {
      border-color: #86efac;
      background: #f0fdf4;
    }
    @media (min-width: 40rem) {
      main { padding: 2rem 1.25rem; }
      button { width: auto; min-width: 8rem; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Quick Capture</h1>
    <p>Tasks, ideas, deadlines — one or many per message.</p>
    <form id="form">
      <textarea id="text" name="text" placeholder="Ring Skatteverket imorgon, fixa Cubase buggen…" required autofocus></textarea>
      <button type="submit" id="submit">Capture</button>
    </form>
    <div id="result" role="status" aria-live="polite"></div>
  </main>
  <script>
    const form = document.getElementById("form");
    const textarea = document.getElementById("text");
    const submit = document.getElementById("submit");
    const result = document.getElementById("result");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const text = textarea.value.trim();
      if (!text) return;

      submit.disabled = true;
      result.className = "visible";
      result.textContent = "Sending…";

      try {
        const response = await fetch("/capture", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        const body = await response.text();
        const isError = body.startsWith("❌");
        result.className = "visible " + (isError ? "error" : "success");
        result.textContent = body;
        if (!isError) textarea.value = "";
      } catch (err) {
        result.className = "visible error";
        result.textContent = "❌ Error: Could not reach server.";
      } finally {
        submit.disabled = false;
        textarea.focus();
      }
    });
  </script>
</body>
</html>
